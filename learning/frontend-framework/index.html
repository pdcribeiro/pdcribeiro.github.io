<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todos</title>
    <link rel="stylesheet" href="/third-party/modern-normalize.min.css" />
    <link rel="stylesheet" href="/style/dark.css" />
    <script type="module" src="./van-tpl.js"></script>
    <script type="module" src="./van-tpl.user.test.js"></script>
</head>

<body style="padding: 1rem 4rem; margin: auto; max-width: 853px; height: 100dvh">
</body>

<template app>
    <script>
        console.debug('script', { isESModule: typeof import.meta !== "undefined" }) // DEV

        let filter = $state('all')
        let tasks = $state([
            { id: 0, title: 'first task', done: true }, { id: 1, title: 'second task', done: false },
        ])

        let tasksByFilter = $derive(() => ({
            all: tasks.val,
            active: tasks.val.filter(t => !t.done),
            completed: tasks.val.filter(t => t.done),
        }))
        let filtered = $derive(() => tasksByFilter.val[filter.val])

        let createTask = (title) => {
            tasks.val = [...tasks.val, { title, done: false, id: tasks.val.length }]
        }
        let toggleTask = (id) => {
            tasks.val = tasks.val.map(t => t.id === id ? { ...t, done: !t.done } : t)
        }
        let deleteTask = (id) => {
            tasks.val = tasks.val.filter(t => t.id !== id)
        }

        // setInterval(() => {
        // createTask(`task ${tasks.val.length + 1}`)
        // }, 1000)
    </script>

    <header>
        <h1>Task Tracker</h1>
    </header>

    <div style="display: flex">
        <main style="flex: 1">
            <task-input @add="e => createTask(e.detail)"></task-input>
            <task-filters @change="e => filter.val = e.detail"></task-filters>
            <ul>
                <li :for="task in filtered.val">
                    <task-item :task @toggle="toggleTask(task.id)" @delete="deleteTask(task.id)"></task-item>
                </li>
                <li :else>No tasks</li>
            </ul>

            <p :if="!filtered.val.length">What's next?</p>
            <p :elsif="tasksByFilter.val.completed.length === tasksByFilter.val.all.length">Great job!</p>
            <p :elsif="filtered.val.length <= 5">Keep it going :)</p>
            <p :else>Take it easy...</p>
        </main>

        <aside>
            <div>
                <p>Active tasks: {tasksByFilter.val.active.length}</p>
                <p>Completed tasks: {tasksByFilter.val.completed.length}</p>
            </div>
        </aside>
    </div>
</template>

<template component="TaskInput">
    <script>
        let newTask = $state('')
        let addTask = () => {
            if (newTask.val) {
                $emit('add', newTask.val)
                newTask.val = ''
            }
        }
    </script>

    <input type="text" :model="newTask" placeholder="New task">
    <button @click="addTask">Add task</button>
</template>

<template component="TaskFilters">
    <script>
        import { FILTERS } from './index.js'
    </script>

    <div>
        <button :for="filter in Object.keys(FILTERS)" @click="$emit('change', filter)">{filter}</button>
    </div>
</template>

<template component="TaskItem">
    <script>
        let { task } = $props
    </script>

    <input type="checkbox" :checked="task.val.done" @input="$emit('toggle')">
    <span>{task.val.title}</span>
    <delete-button @click="$emit('delete')"></delete-button>
</template>

<template component="DeleteButton">
    <button @click="e => confirm('Are you sure?') || e.stopPropagation()">x</button>

    <style>
        button {
            color: red;
        }
    </style>
</template>

</html>
